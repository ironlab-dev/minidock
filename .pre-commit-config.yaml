repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent committing private keys
      - id: detect-private-key
      
      # Prevent committing large files (>500KB)
      - id: check-added-large-files
        args: ['--maxkb=500']
      
      # Check for merge conflicts
      - id: check-merge-conflict
      
      # Check YAML syntax
      - id: check-yaml
        args: ['--unsafe']  # Allow custom tags in GitHub Actions
      
      # Check JSON syntax
      - id: check-json
      
      # Trim trailing whitespace
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      
      # Ensure files end with newline
      - id: end-of-file-fixer

  # Prevent committing sensitive files (even if not in .gitignore)
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  # Custom hook: block AI config files
  - repo: local
    hooks:
      - id: block-ai-configs
        name: Block AI configuration files
        entry: bash
        language: system
        pass_filenames: false
        args:
          - -c
          - |
            if git diff --cached --name-only | grep -qE "(AGENTS\.md|CLAUDE\.md|SECURITY_AUDIT\.md|PRIVATE_REPO\.md|\.claude/|\.kiro/|\.notarize\.env)"; then
              echo "ERROR: Attempting to commit sensitive AI config files"
              exit 1
            fi
